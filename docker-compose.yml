services:
  nginx:
    image: nginx:alpine
    container_name: indian_pizza_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Public URL for devices outside your network (no router port forwarding).
  # Run: docker compose up -d nginx cloudflared
  # Then: docker compose logs cloudflared  → use the https://*.trycloudflare.com URL
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: indian_pizza_tunnel
    command: tunnel --url http://nginx:80
    depends_on:
      - nginx
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: indian_pizza_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j_data/data:/data
      - ./neo4j_data/logs:/logs
      - ./neo4j_data/plugins:/plugins
    environment:
      NEO4J_AUTH: neo4j/polymarket123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    restart: unless-stopped
